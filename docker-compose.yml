version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: jsm-assets-postgres
    environment:
      POSTGRES_DB: jsm_assets
      POSTGRES_USER: jsmapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jsmdev-local-password}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jsmapp -d jsm_assets']
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js application
  app:
    build: .
    container_name: jsm-assets-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://jsmapp:${DB_PASSWORD:-jsmdev-local-password}@postgres:5432/jsm_assets
      DATABASE_CA_CERT: ${DATABASE_CA_CERT:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-key}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_KEY: ${ADMIN_KEY:-dev-admin-key}
      APP_URL: http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      - ./projects:/app/projects
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
